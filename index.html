function renderRules() {
    const container = document.getElementById("rulesList");
    rules.forEach(rule => {
        const btn = document.createElement("div");
        btn.className = "rule-btn";
        btn.innerHTML = `
            <span class="rule-number">${rule.num}</span>
            <i class="fa ${rule.icon}"></i>
            <span>${rule.title}</span>
        `;
        btn.onclick = () => openModal(rule);
        container.appendChild(btn);
    });
}

function openModal(rule) {
    document.getElementById("modalTitle").textContent = `${rule.num}. ${rule.title}`;
   
    let html = "";
    if (rule.image) {
        html += `<img src="${rule.image}" class="map-img" alt="Мапа">`;
    }
    rule.items.forEach(item => {
        html += `
            <div class="rule-item">
                ${item.sub ? `<h4>${item.sub}</h4>` : ""}
                <p>${item.text}</p>
                <div class="penalty ${item.type}">ПОКАРАННЯ: ${item.penalty}</div>
            </div>
        `;
    });
    document.getElementById("modalBody").innerHTML = html;
    document.getElementById("modal").style.display = "flex";
}

function closeModal(e) {
    if (!e || e.target.id === "modal" || e.target.className === "close") {
        document.getElementById("modal").style.display = "none";
    }
}

// Particles — без змін (як було в оригіналі)
const canvas = document.getElementById("particles-bg");
const ctx = canvas.getContext("2d");
function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.onresize = resize;
resize();
const particles = [];
for(let i = 0; i < 80; i++) {
    particles.push({
        x: Math.random() * canvas.width,
        y: canvas.height + Math.random() * 300,
        size: Math.random() * 2.2 + 0.8,
        speed: Math.random() * 0.6 + 0.2,
        alpha: Math.random() * 0.4 + 0.15
    });
}
function animateParticles() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
   
    particles.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * 5, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(127, 255, 0, ${p.alpha * 0.1})`; // змінено тільки rgb
        ctx.shadowBlur = 30;
        ctx.shadowColor = '#7fff00';
        ctx.fill();
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * 2.5, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(127, 255, 0, ${p.alpha * 0.25})`;
        ctx.shadowBlur = 15;
        ctx.shadowColor = '#7fff00';
        ctx.fill();
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255, 255, 255, ${p.alpha * 0.4})`;
        ctx.shadowBlur = 4;
        ctx.shadowColor = '#ffffff';
        ctx.fill();
        p.y -= p.speed;
        if (p.y < -30) {
            p.y = canvas.height + 100;
            p.x = Math.random() * canvas.width;
        }
    });
    requestAnimationFrame(animateParticles);
}
animateParticles();
renderRules();
